version: 2

models:
  - name: stg_suppliers
    description: "staging layer view of suppliers data."
    columns:
      - name: supplier_id
        description: "Primary key for the supplier."
        tests:
          - unique
          - not_null
      
      - name: supplier_name
        description: "Name of the supplier."
      
      - name: category
        description: "The industry category of the supplier"
      
      - name: country
        description: "Country of supplier"